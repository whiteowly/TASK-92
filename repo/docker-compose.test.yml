# Dockerized broad-test stack. Invoked by ./run_tests.sh.
# Uses the prebaked Dockerfile.test image (gradle:8.10.2-jdk21-alpine
# with dependency graph already present) so first-run does not need to
# download the Gradle wrapper distribution mid-test.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: civicworks
      POSTGRES_USER: civicworks
      POSTGRES_PASSWORD: testpass
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicworks"]
      interval: 2s
      timeout: 5s
      retries: 10

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/civicworks
      SPRING_DATASOURCE_USERNAME: civicworks
      SPRING_DATASOURCE_PASSWORD: testpass
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
    # Mount the repo so test reports (build/reports/...) surface on the
    # host and edits between runs are picked up without rebuilding.
    volumes:
      - .:/workspace
      - gradle-cache:/root/.gradle
    command: ["gradle", "test", "--no-daemon", "--console=plain"]

volumes:
  gradle-cache:
